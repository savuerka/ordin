<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>@yield("title")</title>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
        a { color: #38bdf8; }
        .page { max-width: 920px; margin: 0 auto; padding: 48px 24px; }
        .card { background: #111827; border: 1px solid #334155; border-radius: 20px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.24); }
        .muted { color: #94a3b8; }
        code { background: #020617; border: 1px solid #334155; border-radius: 8px; padding: 2px 6px; }
        nav { margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="page">
        @include("partials.nav")

        <main class="card">
            @yield("content")
        </main>
    </div>
</body>
</html>
